<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Rulespace glider mark — dark-mode variant
       Same 3x3 glider pattern, pitch 40px, cell size 32px, corner radius 6px
       Blue cells swapped to off-white for dark backgrounds; coral accent unchanged
       Background: transparent (intended for placement on dark surfaces) -->

  <!-- row 0 -->
  <rect x="84"  y="44"  width="32" height="32" rx="6" ry="6" fill="#F2F3F3"/>

  <!-- row 1 -->
  <rect x="124" y="84"  width="32" height="32" rx="6" ry="6" fill="#F2F3F3"/>

  <!-- row 2 -->
  <rect x="44"  y="124" width="32" height="32" rx="6" ry="6" fill="#F2F3F3"/>
  <rect x="84"  y="124" width="32" height="32" rx="6" ry="6" fill="#F2F3F3"/>
  <rect x="124" y="124" width="32" height="32" rx="6" ry="6" fill="#CF4832"/>
</svg>
