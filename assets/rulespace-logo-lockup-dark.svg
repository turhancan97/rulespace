<svg viewBox="0 0 860 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Rulespace horizontal lockup — dark-mode variant
       Icon: off-white cells + coral accent (matches rulespace-logo-dark.svg)
       Wordmark: "rule" in off-white, "space" in coral
       Intended for placement on dark backgrounds -->

  <!-- ICON -->
  <rect x="84"  y="44"  width="32" height="32" rx="6" ry="6" fill="#F2F3F3"/>
  <rect x="124" y="84"  width="32" height="32" rx="6" ry="6" fill="#F2F3F3"/>
  <rect x="44"  y="124" width="32" height="32" rx="6" ry="6" fill="#F2F3F3"/>
  <rect x="84"  y="124" width="32" height="32" rx="6" ry="6" fill="#F2F3F3"/>
  <rect x="124" y="124" width="32" height="32" rx="6" ry="6" fill="#CF4832"/>

  <!-- WORDMARK -->
  <text x="230" y="145"
        font-family="'JetBrains Mono', 'IBM Plex Mono', 'Space Mono', monospace"
        font-weight="700"
        font-size="108"
        letter-spacing="0">
    <tspan fill="#F2F3F3">rule</tspan><tspan fill="#CF4832">space</tspan>
  </text>
</svg>
