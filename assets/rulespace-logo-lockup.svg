<svg viewBox="0 0 860 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Rulespace horizontal lockup: icon + wordmark
       Icon: original glider mark, unscaled, occupying the left 200x200
       Wordmark: monospace, "rule" in blue, "space" in coral — mirrors the
       icon's color split (5 blue cells, 1 coral accent cell) -->

  <!-- ICON -->
  <rect x="84"  y="44"  width="32" height="32" rx="6" ry="6" fill="#3A7EAB"/>
  <rect x="124" y="84"  width="32" height="32" rx="6" ry="6" fill="#3A7EAB"/>
  <rect x="44"  y="124" width="32" height="32" rx="6" ry="6" fill="#3A7EAB"/>
  <rect x="84"  y="124" width="32" height="32" rx="6" ry="6" fill="#3A7EAB"/>
  <rect x="124" y="124" width="32" height="32" rx="6" ry="6" fill="#CF4832"/>

  <!-- WORDMARK -->
  <text x="230" y="145"
        font-family="'JetBrains Mono', 'IBM Plex Mono', 'Space Mono', monospace"
        font-weight="700"
        font-size="108"
        letter-spacing="0">
    <tspan fill="#3A7EAB">rule</tspan><tspan fill="#CF4832">space</tspan>
  </text>
</svg>
