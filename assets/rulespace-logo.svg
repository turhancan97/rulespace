<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Rulespace glider mark
       Grid: 3x3, pitch 40px, cell size 32px, corner radius 6px
       Pattern (row, col), 0-indexed from top-left:
         row0: col1 filled (blue)
         row1: col2 filled (blue)
         row2: col0, col1 filled (blue); col2 filled (coral - leading cell)
       Background: transparent -->

  <!-- row 0 -->
  <rect x="84"  y="44"  width="32" height="32" rx="6" ry="6" fill="#3A7EAB"/>

  <!-- row 1 -->
  <rect x="124" y="84"  width="32" height="32" rx="6" ry="6" fill="#3A7EAB"/>

  <!-- row 2 -->
  <rect x="44"  y="124" width="32" height="32" rx="6" ry="6" fill="#3A7EAB"/>
  <rect x="84"  y="124" width="32" height="32" rx="6" ry="6" fill="#3A7EAB"/>
  <rect x="124" y="124" width="32" height="32" rx="6" ry="6" fill="#CF4832"/>
</svg>
